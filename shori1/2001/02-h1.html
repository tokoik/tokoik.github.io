<h1>“コンソール”と“UNIXシェル”の違い</h1>

どちらも同じような端末ウィンドウとして使えます。
但し、コンソールの方は、
オペレーティングシステムのエラーメッセージなども表示されます。
コンソールウィンドウはなくても支障ありませんが、
エラーメッセージが表示されたことを知るためには、
一つだけ開いておく（最小化していてもかまいません）必要があります。
もしコンソールウィンドウを閉じてしまったときには、
Toolchest において“システム”→“ユーティリティ”→
“新しいコンソールを開く”の順にクリックしていってください。
