<h1>背景画像の貼り付け</h1>

背景画像を貼り付けるときは、
bgcolor= も指定してください。
背景画像が表示されていることを前提に文字の色を設定していると、
背景画像の転送中や背景画像が転送されなかったときに、
デフォルトのグレーの背景が表示されてしまい、
文字が非常に読みにくくなります。
bgcolor= には背景画像の“平均の色”を指定しておけば良いでしょう。
なお、この例のように、
文字にどんな色を指定しても読みにくいような背景は用いるべきではありません。
