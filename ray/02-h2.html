<h1>視線の方程式</h1>

<p>視点が <b>P</b><sub>e</sub> = (ex, ey, ez)
の位置にあり，<b>V</b> = (vx, vy, vz)
の方向を向いている視線の方程式は，</p>

<blockquote>
x = vx * t + ex<br>
y = vy * t + ey<br>
z = vz * t + ez
</blockquote>

<p>これをベクトル形式で表せば，</p>

<blockquote>
<b>P</b> = <b>V</b>t + <b>P</b><sub>e</sub>
</blockquote>

</body>
