<body>

<h1>映り込みの色の合成</h1>

<p>現在の可視点における陰影の色を C<sub>d</sub>，
そこに映り込む反射先の物体の陰影の色を C<sub>s</sub>，
現在の可視点の映り込みの反射率を K<sub>r</sub>，
鏡面反射係数を K<sub>s</sub>
とすると，合成された色 C は，</p>

<blockquote>
C = C<sub>d</sub> + K<sub>r</sub> * K<sub>s</sub> * C<sub>s</sub>
</blockquote>

</body>
</html>
