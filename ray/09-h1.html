<body>

<h1>透過の色の合成</h1>

<p>現在の可視点における陰影の色を C<sub>d</sub>，
そこから見える向こう側の色を C<sub>t</sub>，
現在の可視点の透明度を K<sub>t</sub>，
拡散反射係数を K<sub>d</sub>
とすると，合成された色 C は，</p>

<blockquote>
C = (1 - K<sub>t</sub>) * C<sub>d</sub> + K<sub>t</sub> * K<sub>d</sub> * C<sub>t</sub>
</blockquote>

</body>
</html>
