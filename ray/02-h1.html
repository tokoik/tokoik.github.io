<h1>球の方程式</h1>

<p>中心が <b>P</b><sub>c</sub> = (cx, cy, cz)
にあり，半径が r の球の方程式 は，</p>

<blockquote>
(x - cx)<sup>2</sup> + (y - cy)<sup>2</sup> + (z - cz)<sup>2</sup> = r<sup>2</sup>
</blockquote>

<p><b>P</b> = (x, y, z) とおけば，これを次式のようにベクトルを使って表すことができる．</p>

<blockquote>
(<b>P</b> - <b>P</b><sub>c</sub>)<sup>2</sup> = r<sup>2</sup>
</blockquote>

<p>ここで (<b>P</b> - <b>P</b><sub>c</sub>)<sup>2</sup> = (<b>P</b> - <b>P</b><sub>c</sub>)・(<b>P</b> - <b>P</b><sub>c</sub>)&nbsp;&nbsp;&nbsp;&nbsp;("・" はベクトルの内積)</p>
</body>
