<h1>視線ベクトルの反射ベクトル</h1>

<p>視線ベクトル <b>V</b>，反射点の法線ベクトル <b>N</b>
のとき，視線ベクトルの反射ベクトル <b>F</b>
は，</p>

<blockquote>
<b>F</b> = <b>V</b> - 2<b>N</b>(<b>N</b> &middot; <b>V</b>)
</blockquote>
